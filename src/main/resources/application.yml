spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/big_event
    username: root
    password: root
  data:
    redis:
      host: localhost
      port: 6379

mybatis:
  type-aliases-package: com.example.campus_blog_forum_system.pojo
  configuration:
    map-underscore-to-camel-case: true
app:
  upload-dir: E:/file
admin:
  auth:
    enabled: true
    default-username: admin
    default-password: ${ADMIN_DEFAULT_PASSWORD:admin} # 从环境变量读取，默认admin
  upload:
    max-file-size: 10MB
    allowed-extensions: jpg,png,pdf,docx


