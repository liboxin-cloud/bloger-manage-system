<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>忘记密码 - 校园论坛管理系统</title>
    <link href="/static/css/bootstrap.min.css" rel="stylesheet">
    <link href="/static/css/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #e4e7f1 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            padding: 20px;
        }
        .forgot-container {
            max-width: 500px;
            width: 100%;
            margin: 0 auto;
        }
        .forgot-card {
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            border: none;
            background: #ffffff;
        }
        .forgot-header {
            background: linear-gradient(135deg, #6c757d 0%, #495057 100%);
            color: white;
            padding: 30px 20px;
            text-align: center;
        }
        .forgot-body {
            padding: 30px;
        }
        .form-control {
            border-radius: 10px;
            padding: 12px 15px;
            border: 1px solid #dee2e6;
            background-color: #f8f9fa;
        }
        .form-control:focus {
            border-color: #6c757d;
            box-shadow: 0 0 0 0.2rem rgba(108, 117, 125, 0.25);
            background-color: #fff;
        }
        .btn-forgot {
            background: linear-gradient(135deg, #6c757d 0%, #495057 100%);
            border: none;
            border-radius: 10px;
            padding: 12px;
            font-weight: 600;
            transition: all 0.3s ease;
            color: white;
            width: 100%;
        }
        .btn-forgot:hover {
            background: linear-gradient(135deg, #5a6268 0%, #343a40 100%);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }
        .btn-outline-forgot {
            background: transparent;
            border: 2px solid #6c757d;
            border-radius: 10px;
            padding: 10px 20px;
            font-weight: 600;
            transition: all 0.3s ease;
            color: #6c757d;
        }
        .btn-outline-forgot:hover {
            background: #6c757d;
            color: white;
        }
        .forgot-footer {
            text-align: center;
            padding: 20px;
            border-top: 1px solid #eee;
            background-color: #f8f9fa;
        }
        .alert {
            border-radius: 10px;
        }
        .logo {
            font-size: 2.5rem;
            margin-bottom: 15px;
        }
        .form-label {
            font-weight: 500;
            color: #495057;
        }
        .input-group-text {
            background-color: #e9ecef;
            border-color: #dee2e6;
            color: #495057;
        }
        .step-indicator {
            display: flex;
            justify-content: center;
            margin-bottom: 30px;
            gap: 40px;
            position: relative;
        }
        .step-indicator::before {
            content: '';
            position: absolute;
            top: 15px;
            left: 60px;
            right: 60px;
            height: 2px;
            background: #dee2e6;
            z-index: 1;
        }
        .step-item {
            position: relative;
            z-index: 2;
            text-align: center;
            background: white;
            padding: 0 10px;
        }
        .step-number {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: #e9ecef;
            color: #6c757d;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 8px;
            font-weight: 600;
            border: 2px solid #dee2e6;
        }
        .step-item.active .step-number {
            background: #6c757d;
            color: white;
            border-color: #6c757d;
        }
        .step-item.completed .step-number {
            background: #28a745;
            color: white;
            border-color: #28a745;
        }
        .step-text {
            font-size: 0.85rem;
            color: #6c757d;
        }
        .step-item.active .step-text {
            color: #495057;
            font-weight: 500;
        }
        .captcha-image {
            border: 1px solid #dee2e6;
            border-left: none;
            border-radius: 0 4px 4px 0;
            height: 42px;
            background-color: #f8f9fa;
            cursor: pointer;
            min-width: 120px;
            object-fit: cover;
        }
        #captcha {
            border-right: none;
            border-radius: 4px 0 0 4px;
            height: 42px;
        }
        .password-strength {
            height: 4px;
            border-radius: 2px;
            margin-top: 8px;
            transition: all 0.3s ease;
        }
        .strength-weak {
            background: #dc3545;
            width: 33.33%;
        }
        .strength-medium {
            background: #ffc107;
            width: 66.66%;
        }
        .strength-strong {
            background: #28a745;
            width: 100%;
        }
        .back-to-login {
            color: #6c757d;
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.3s ease;
        }
        .back-to-login:hover {
            color: #495057;
            text-decoration: underline;
        }
        .resend-code {
            color: #6c757d;
            text-decoration: none;
            font-size: 0.85rem;
            cursor: pointer;
        }
        .resend-code:hover {
            color: #495057;
            text-decoration: underline;
        }
        .resend-code.disabled {
            color: #adb5bd;
            cursor: not-allowed;
            pointer-events: none;
        }
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }
        .loading-spinner {
            width: 50px;
            height: 50px;
        }
    </style>
</head>
<body>
<!-- 加载动画 -->
<div class="loading-overlay" id="loadingOverlay">
    <div class="spinner-border text-primary loading-spinner" role="status">
        <span class="visually-hidden">加载中...</span>
    </div>
</div>

<div class="forgot-container">
    <div class="forgot-card">
        <div class="forgot-header">
            <div class="logo">
                <i class="bi bi-key"></i>
            </div>
            <h2>忘记密码</h2>
            <p class="mb-0">重置您的账户密码</p>
        </div>
        <div class="forgot-body">
            <!-- 错误提示 -->
            <div class="alert alert-danger d-none" id="errorMessage"></div>

            <!-- 成功提示 -->
            <div class="alert alert-success d-none" id="successMessage"></div>

            <!-- 步骤指示器 -->
            <div class="step-indicator" id="stepIndicator">
                <div class="step-item active" id="step1">
                    <div class="step-number">1</div>
                    <div class="step-text">验证账号</div>
                </div>
                <div class="step-item" id="step2">
                    <div class="step-number">2</div>
                    <div class="step-text">验证身份</div>
                </div>
                <div class="step-item" id="step3">
                    <div class="step-number">3</div>
                    <div class="step-text">重置密码</div>
                </div>
            </div>

            <!-- 步骤1：验证账号 -->
            <div id="step1Content">
                <form id="step1Form">
                    <div class="mb-3">
                        <label for="username" class="form-label">用户名/邮箱</label>
                        <div class="input-group">
                            <span class="input-group-text">
                                <i class="bi bi-person"></i>
                            </span>
                            <input type="text" class="form-control" id="username"
                                   placeholder="请输入用户名或注册邮箱" required>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="userType" class="form-label">账户类型</label>
                        <select class="form-select" id="userType">
                            <option value="user">普通用户</option>
                            <option value="admin">管理员</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label for="captcha" class="form-label">验证码</label>
                        <div class="input-group">
                            <input type="text" class="form-control" id="captcha"
                                   placeholder="请输入验证码" maxlength="4">
                            <img id="captchaImage" class="captcha-image" alt="验证码"
                                 title="点击刷新验证码">
                        </div>
                    </div>

                    <button type="submit" class="btn btn-forgot" id="step1Btn">
                        <span id="step1Text">下一步</span>
                        <span id="step1Spinner" class="spinner-border spinner-border-sm d-none" role="status"></span>
                    </button>
                </form>
            </div>

            <!-- 步骤2：验证身份 -->
            <div id="step2Content" style="display: none;">
                <form id="step2Form">
                    <div class="mb-3">
                        <p class="text-muted small">验证码已发送至您的邮箱 <strong id="userEmail">example@email.com</strong></p>
                    </div>

                    <div class="mb-3">
                        <label for="verificationCode" class="form-label">验证码</label>
                        <div class="input-group">
                            <span class="input-group-text">
                                <i class="bi bi-shield-lock"></i>
                            </span>
                            <input type="text" class="form-control" id="verificationCode"
                                   placeholder="请输入6位验证码" maxlength="6" required>
                        </div>
                    </div>

                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <span class="resend-code" id="resendCode">重新发送验证码</span>
                        <span class="text-muted small" id="countdown">60秒后重新发送</span>
                    </div>

                    <div class="d-flex gap-2">
                        <button type="button" class="btn btn-outline-forgot flex-grow-1" id="backToStep1">
                            上一步
                        </button>
                        <button type="submit" class="btn btn-forgot flex-grow-1" id="step2Btn">
                            <span id="step2Text">验证</span>
                            <span id="step2Spinner" class="spinner-border spinner-border-sm d-none" role="status"></span>
                        </button>
                    </div>
                </form>
            </div>

            <!-- 步骤3：重置密码 -->
            <div id="step3Content" style="display: none;">
                <form id="step3Form">
                    <div class="mb-3">
                        <label for="newPassword" class="form-label">新密码</label>
                        <div class="input-group">
                            <span class="input-group-text">
                                <i class="bi bi-lock"></i>
                            </span>
                            <input type="password" class="form-control" id="newPassword"
                                   placeholder="请输入新密码" required>
                            <button class="btn btn-outline-secondary" type="button"
                                    onclick="togglePassword('newPassword')">
                                <i class="bi bi-eye" id="newPasswordIcon"></i>
                            </button>
                        </div>
                        <div class="password-strength" id="passwordStrength"></div>
                        <div class="form-text">密码必须为5-16位，不能包含空格</div>
                    </div>

                    <div class="mb-3">
                        <label for="confirmPassword" class="form-label">确认新密码</label>
                        <div class="input-group">
                            <span class="input-group-text">
                                <i class="bi bi-lock-fill"></i>
                            </span>
                            <input type="password" class="form-control" id="confirmPassword"
                                   placeholder="请再次输入新密码" required>
                            <button class="btn btn-outline-secondary" type="button"
                                    onclick="togglePassword('confirmPassword')">
                                <i class="bi bi-eye" id="confirmPasswordIcon"></i>
                            </button>
                        </div>
                    </div>

                    <div class="d-flex gap-2">
                        <button type="button" class="btn btn-outline-forgot flex-grow-1" id="backToStep2">
                            上一步
                        </button>
                        <button type="submit" class="btn btn-forgot flex-grow-1" id="step3Btn">
                            <span id="step3Text">确认重置</span>
                            <span id="step3Spinner" class="spinner-border spinner-border-sm d-none" role="status"></span>
                        </button>
                    </div>
                </form>
            </div>

            <!-- 返回登录链接 -->
            <div class="text-center mt-3">
                <a href="/login" class="back-to-login">
                    <i class="bi bi-arrow-left me-1"></i>返回登录
                </a>
            </div>
        </div>
        <div class="forgot-footer">
            <p class="mb-0 text-muted">© 2025 校园论坛管理系统</p>
        </div>
    </div>
</div>

<script src="/static/js/bootstrap.bundle.min.js"></script>
<script src="/static/js/axios.min.js"></script>
<script>
    // 全局变量
    let currentStep = 1;
    let countdownInterval;
    let countdownSeconds = 60;
    let userEmail = '';
    let userType = 'user';

    // 配置 axios
    axios.defaults.baseURL = window.location.origin;

    // 请求拦截器
    axios.interceptors.request.use(config => {
        showLoading();
        return config;
    }, error => {
        hideLoading();
        return Promise.reject(error);
    });

    // 响应拦截器
    axios.interceptors.response.use(response => {
        hideLoading();
        return response;
    }, error => {
        hideLoading();
        if (error.response) {
            console.error('API错误:', error.response.data);
            showError(error.response.data.message || error.response.data.error || '请求失败');
        } else {
            showError('网络错误，请稍后重试');
        }
        return Promise.reject(error);
    });

    // 页面加载完成后执行
    document.addEventListener('DOMContentLoaded', function() {
        // 初始化验证码
        refreshCaptcha();

        // 绑定事件
        bindEvents();

        // 监听密码输入
        document.getElementById('newPassword').addEventListener('input', checkPasswordStrength);

        // 监听用户类型变化
        document.getElementById('userType').addEventListener('change', function(e) {
            userType = e.target.value;
        });
    });

    // 显示加载动画
    function showLoading() {
        document.getElementById('loadingOverlay').style.display = 'flex';
    }

    // 隐藏加载动画
    function hideLoading() {
        document.getElementById('loadingOverlay').style.display = 'none';
    }

    // 绑定事件
    function bindEvents() {
        // 步骤1表单提交
        document.getElementById('step1Form').addEventListener('submit', function(e) {
            e.preventDefault();
            verifyAccount();
        });

        // 步骤2表单提交
        document.getElementById('step2Form').addEventListener('submit', function(e) {
            e.preventDefault();
            verifyCode();
        });

        // 步骤3表单提交
        document.getElementById('step3Form').addEventListener('submit', function(e) {
            e.preventDefault();
            resetPassword();
        });

        // 返回步骤1
        document.getElementById('backToStep1').addEventListener('click', function() {
            goToStep(1);
        });

        // 返回步骤2
        document.getElementById('backToStep2').addEventListener('click', function() {
            goToStep(2);
        });

        // 点击验证码图片刷新
        document.getElementById('captchaImage').addEventListener('click', refreshCaptcha);

        // 重新发送验证码
        document.getElementById('resendCode').addEventListener('click', resendVerificationCode);
    }

    // 刷新验证码
    function refreshCaptcha() {
        axios.get('/captcha/generate')
            .then(response => {
                if (response.data.success) {
                    document.getElementById('captchaImage').src = response.data.image;
                }
            })
            .catch(error => {
                console.error('获取验证码失败:', error);
            });
    }

    // 切换到指定步骤
    function goToStep(step) {
        currentStep = step;

        // 更新步骤指示器
        document.querySelectorAll('.step-item').forEach((item, index) => {
            item.classList.remove('active', 'completed');
            if (index + 1 < step) {
                item.classList.add('completed');
            } else if (index + 1 === step) {
                item.classList.add('active');
            }
        });

        // 显示对应步骤的内容
        document.getElementById('step1Content').style.display = step === 1 ? 'block' : 'none';
        document.getElementById('step2Content').style.display = step === 2 ? 'block' : 'none';
        document.getElementById('step3Content').style.display = step === 3 ? 'block' : 'none';

        // 清除错误提示
        hideError();
    }

    // 验证账号
    function verifyAccount() {
        const username = document.getElementById('username').value.trim();
        const userType = document.getElementById('userType').value;
        const captcha = document.getElementById('captcha').value.trim();

        // 表单验证
        if (!username) {
            showError('请输入用户名或邮箱');
            return;
        }

        if (!captcha) {
            showError('请输入验证码');
            return;
        }

        if (captcha.length !== 4) {
            showError('验证码必须是4位');
            return;
        }

        setStep1ButtonState(true);
        hideError();

        // 调用后端API
        axios.post('/forgot-password/verify-account', {
            username: username,
            userType: userType,
            captcha: captcha
        })
            // 验证账号成功后
            .then(response => {
                if (response.data.code === 0) {
                    const data = response.data.data;
                    userEmail = data.fullEmail;  // ✅ 存完整邮箱用于验证
                    document.getElementById('userEmail').textContent = data.email; // 显示脱敏邮箱

                    setStep1ButtonState(false);
                    goToStep(2);
                    startCountdown();
                    showSuccess('验证码已发送到您的邮箱');
                } else {
                    showError(response.data.message || '验证失败');
                    setStep1ButtonState(false);
                    refreshCaptcha();
                }
            })
            .catch(error => {
                console.error('验证账号失败:', error);
                setStep1ButtonState(false);
                refreshCaptcha();
            });
    }

    // 验证码倒计时
    function startCountdown() {
        // 清除之前的倒计时
        if (countdownInterval) {
            clearInterval(countdownInterval);
        }

        countdownSeconds = 60;
        const resendLink = document.getElementById('resendCode');
        const countdownEl = document.getElementById('countdown');

        resendLink.classList.add('disabled');
        countdownEl.textContent = `${countdownSeconds}秒后重新发送`;

        countdownInterval = setInterval(() => {
            countdownSeconds--;
            countdownEl.textContent = `${countdownSeconds}秒后重新发送`;

            if (countdownSeconds <= 0) {
                clearInterval(countdownInterval);
                resendLink.classList.remove('disabled');
                countdownEl.textContent = '可以重新发送';
            }
        }, 1000);
    }

    // 重新发送验证码
    function resendVerificationCode() {
        if (document.getElementById('resendCode').classList.contains('disabled')) {
            return;
        }

        if (!userEmail) {
            showError('邮箱信息丢失，请返回第一步重新验证');
            return;
        }

        // 调用重新发送API
        axios.post('/forgot-password/resend-code', {
            email: userEmail,
            userType: userType
        })
            .then(response => {
                if (response.data.code === 0) {
                    startCountdown();
                    showSuccess('验证码已重新发送');
                } else {
                    showError(response.data.message || '发送失败');
                }
            })
            .catch(error => {
                console.error('重新发送失败:', error);
            });
    }

    // 验证验证码
    function verifyCode() {
        const code = document.getElementById('verificationCode').value.trim();

        if (!code) {
            showError('请输入验证码');
            return;
        }

        if (code.length !== 6) {
            showError('请输入6位验证码');
            return;
        }

        if (!/^\d+$/.test(code)) {
            showError('验证码必须是数字');
            return;
        }

        setStep2ButtonState(true);
        hideError();

        // 调用验证API
        axios.post('/forgot-password/verify-code', {
            email: userEmail,
            code: code,
            userType: userType
        })
            .then(response => {
                if (response.data.code === 0) {
                    setStep2ButtonState(false);
                    goToStep(3);

                    // 清除倒计时
                    if (countdownInterval) {
                        clearInterval(countdownInterval);
                    }
                } else {
                    showError(response.data.message || '验证码错误');
                    setStep2ButtonState(false);
                }
            })
            .catch(error => {
                console.error('验证码验证失败:', error);
                setStep2ButtonState(false);
            });
    }

    // 检查密码强度
    function checkPasswordStrength() {
        const password = document.getElementById('newPassword').value;
        const strengthEl = document.getElementById('passwordStrength');

        if (!password) {
            strengthEl.className = 'password-strength';
            return;
        }

        let strength = 0;

        // 长度检查
        if (password.length >= 5) strength++;
        if (password.length >= 8) strength++;

        // 包含数字
        if (/\d/.test(password)) strength++;

        // 包含字母
        if (/[a-zA-Z]/.test(password)) strength++;

        // 包含特殊字符
        if (/[!@#$%^&*]/.test(password)) strength++;

        if (strength <= 2) {
            strengthEl.className = 'password-strength strength-weak';
        } else if (strength <= 4) {
            strengthEl.className = 'password-strength strength-medium';
        } else {
            strengthEl.className = 'password-strength strength-strong';
        }
    }

    // 重置密码
    function resetPassword() {
        const newPassword = document.getElementById('newPassword').value;
        const confirmPassword = document.getElementById('confirmPassword').value;

        // 验证
        if (!newPassword || !confirmPassword) {
            showError('请输入密码');
            return;
        }

        if (newPassword.length < 5 || newPassword.length > 16) {
            showError('密码长度必须为5-16位');
            return;
        }

        if (/\s/.test(newPassword)) {
            showError('密码不能包含空格');
            return;
        }

        if (newPassword !== confirmPassword) {
            showError('两次输入的密码不一致');
            return;
        }

        setStep3ButtonState(true);
        hideError();

        // 调用重置密码API
        axios.post('/forgot-password/reset', {
            email: userEmail,
            newPassword: newPassword,
            userType: userType
        })
            .then(response => {
                if (response.data.code === 0) {
                    setStep3ButtonState(false);
                    showSuccess('密码重置成功！3秒后跳转到登录页面...');

                    // 清除所有输入
                    document.getElementById('newPassword').value = '';
                    document.getElementById('confirmPassword').value = '';

                    // 3秒后跳转到登录页
                    setTimeout(() => {
                        window.location.href = '/login';
                    }, 3000);
                } else {
                    showError(response.data.message || '密码重置失败');
                    setStep3ButtonState(false);
                }
            })
            .catch(error => {
                console.error('重置密码失败:', error);
                setStep3ButtonState(false);
            });
    }

    // 切换密码显示
    function togglePassword(inputId) {
        const input = document.getElementById(inputId);
        const icon = document.getElementById(inputId + 'Icon');

        if (input.type === 'password') {
            input.type = 'text';
            icon.className = 'bi bi-eye-slash';
        } else {
            input.type = 'password';
            icon.className = 'bi bi-eye';
        }
    }

    // 显示错误信息
    function showError(message) {
        const errorElement = document.getElementById('errorMessage');
        errorElement.textContent = message;
        errorElement.classList.remove('d-none');

        // 隐藏成功提示
        document.getElementById('successMessage').classList.add('d-none');

        // 3秒后自动隐藏错误提示
        setTimeout(() => {
            errorElement.classList.add('d-none');
        }, 5000);
    }

    // 显示成功信息
    function showSuccess(message) {
        const successElement = document.getElementById('successMessage');
        successElement.textContent = message;
        successElement.classList.remove('d-none');

        // 隐藏错误提示
        document.getElementById('errorMessage').classList.add('d-none');

        // 3秒后自动隐藏成功提示
        setTimeout(() => {
            successElement.classList.add('d-none');
        }, 5000);
    }

    // 隐藏错误信息
    function hideError() {
        document.getElementById('errorMessage').classList.add('d-none');
        document.getElementById('successMessage').classList.add('d-none');
    }

    // 设置步骤1按钮状态
    function setStep1ButtonState(loading) {
        const btn = document.getElementById('step1Btn');
        const text = document.getElementById('step1Text');
        const spinner = document.getElementById('step1Spinner');

        btn.disabled = loading;
        if (loading) {
            text.textContent = '验证中...';
            spinner.classList.remove('d-none');
        } else {
            text.textContent = '下一步';
            spinner.classList.add('d-none');
        }
    }

    // 设置步骤2按钮状态
    function setStep2ButtonState(loading) {
        const btn = document.getElementById('step2Btn');
        const text = document.getElementById('step2Text');
        const spinner = document.getElementById('step2Spinner');

        btn.disabled = loading;
        if (loading) {
            text.textContent = '验证中...';
            spinner.classList.remove('d-none');
        } else {
            text.textContent = '验证';
            spinner.classList.add('d-none');
        }
    }

    // 设置步骤3按钮状态
    function setStep3ButtonState(loading) {
        const btn = document.getElementById('step3Btn');
        const text = document.getElementById('step3Text');
        const spinner = document.getElementById('step3Spinner');

        btn.disabled = loading;
        if (loading) {
            text.textContent = '重置中...';
            spinner.classList.remove('d-none');
        } else {
            text.textContent = '确认重置';
            spinner.classList.add('d-none');
        }
    }
</script>
