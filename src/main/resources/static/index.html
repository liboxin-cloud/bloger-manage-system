<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>校园论坛 - 首页</title>
    <link href="/static/css/bootstrap.min.css" rel="stylesheet">
    <link href="/static/css/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 1rem 0;
        }
        .article-card {
            border-radius: 10px;
            overflow: hidden;
            transition: all 0.3s ease;
            margin-bottom: 20px;
            border: none;
            box-shadow: 0 0.125rem 0.25rem rgba(0, 0, 0, 0.075);
        }
        .article-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.15);
        }
        .article-cover {
            height: 200px;
            object-fit: cover;
        }
        .category-badge {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
        }
        .article-meta {
            font-size: 0.85rem;
            color: #6c757d;
        }
        .sidebar {
            position: sticky;
            top: 20px;
        }
        .nav-pills .nav-link.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .user-info {
            background: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 0.125rem 0.25rem rgba(0, 0, 0, 0.075);
        }
        .category-list .list-group-item {
            border: none;
            border-radius: 8px;
            margin-bottom: 5px;
            transition: all 0.2s;
        }
        .category-list .list-group-item:hover {
            background-color: #e9ecef;
        }
        .category-list .list-group-item.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
        }
        .pagination .page-item.active .page-link {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-color: #667eea;
        }
        .article-state {
            font-size: 0.8rem;
            padding: 3px 8px;
            border-radius: 4px;
        }
        .state-published {
            background-color: #d4edda;
            color: #155724;
        }
        .state-draft {
            background-color: #f8d7da;
            color: #721c24;
        }
        .no-articles {
            text-align: center;
            padding: 40px;
            color: #6c757d;
        }
        .no-articles i {
            font-size: 3rem;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
<!-- 导航栏 -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="#">
            <i class="bi bi-chat-square-text me-2"></i>校园论坛
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link active" href="/index" onclick="loadHomePage(); return false;">首页</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#" onclick="loadHotArticles(); return false;">热门文章</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#" onclick="loadLatestArticles(); return false;">最新发布</a>
                </li>
            </ul>
            <div class="d-flex align-items-center" id="userActions">
                <!-- 未登录状态 -->
                <div id="guestActions">
                    <a href="login" class="btn btn-outline-light me-2">登录</a>
                    <a href="register" class="btn btn-light">注册</a>
                </div>
                <!-- 登录状态 -->
                <div id="userActionsLoggedIn" class="d-none">
                    <span class="text-white me-3" id="welcomeUser"></span>
                    <div class="dropdown">
                        <button class="btn btn-outline-light dropdown-toggle" type="button" data-bs-toggle="dropdown">
                            <i class="bi bi-person-circle me-1"></i>个人中心
                        </button>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" href="/index/user-info"><i class="bi bi-person me-2"></i>个人信息</a></li>
                            <li><a class="dropdown-item" href="/index/my-article"><i class="bi bi-file-earmark-text me-2"></i>我的文章</a></li>
                            <li><hr class="dropdown-divider"></li>
                            <li><a class="dropdown-item" href="#" id="logoutBtn"><i class="bi bi-box-arrow-right me-2"></i>退出登录</a></li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </div>
</nav>

<!-- 主要内容 -->
<div class="container mt-4">
    <div class="row">
        <!-- 左侧文章列表 -->
        <div class="col-lg-8">
            <!-- 筛选和搜索 -->
            <div class="card mb-4">
                <div class="card-body">
                    <div class="row g-3">
                        <div class="col-md-5">
                            <select class="form-select" id="categoryFilter">
                                <option value="">所有分类</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <select class="form-select" id="stateFilter">
                                <option value="">所有状态</option>
                                <option value="已发布">已发布</option>
                            </select>
                        </div>

                        <div class="col-md-3">
                            <button class="btn btn-primary w-100" id="filterBtn">筛选</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 文章列表 -->
            <div id="articlesContainer">
                <!-- 文章将通过JS动态加载 -->
                <div class="no-articles" id="noArticles">
                    <i class="bi bi-file-earmark-text"></i>
                    <h4>暂无文章</h4>
                    <p>当前没有符合条件的文章，请稍后再试</p>
                </div>
            </div>

            <!-- 分页 -->
            <nav aria-label="文章分页" id="paginationContainer">

        </div>

        <!-- 右侧边栏 -->
        <div class="col-lg-4">
            <!-- 用户信息 -->
            <div class="user-info mb-4" id="userInfoCard">

            </div>

            <!-- 分类列表 -->
            <div class="card mb-4">
                <div class="card-header">
                    <h5 class="mb-0"><i class="bi bi-tags me-2"></i>文章分类</h5>
                </div>
                <div class="card-body">
                    <div class="list-group list-group-flush category-list" id="categoryList">
                        <!-- 分类将通过JS动态加载 -->
                        <a href="#" class="list-group-item list-group-item-action active" data-id="">
                            全部分类
                        </a>
                    </div>
                </div>
            </div>

            <!-- 热门标签 -->
            <div class="card">
                <div class="card-header">
                    <h5 class="mb-0"><i class="bi bi-fire me-2"></i>热门标签</h5>
                </div>
                <div class="card-body">
                    <div class="d-flex flex-wrap gap-2">
                        <span class="badge bg-secondary">技术分享</span>
                        <span class="badge bg-secondary">校园生活</span>
                        <span class="badge bg-secondary">学习心得</span>
                        <span class="badge bg-secondary">社团活动</span>
                        <span class="badge bg-secondary">就业指导</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- 页脚 -->
<footer class="bg-dark text-white mt-5 py-4">

<script src="/static/js/bootstrap.bundle.min.js"></script>
<script src="/static/js/axios.min.js"></script>
<script>
    // 全局变量
    let token = localStorage.getItem('userToken');
    let currentPage = 1;
    const pageSize = 5;
    let categories = [];
    let currentFilters = {
        categoryId: '',
        state: '已发布' // 默认只显示已发布的文章
    };

    // 配置axios
    axios.defaults.baseURL = window.location.origin;

    // 请求拦截器 - 自动添加token
    axios.interceptors.request.use(config => {
        if (token) {
            config.headers.Authorization = `Bearer ${token}`;
        }
        return config;
    }, error => {
        return Promise.reject(error);
    });

    // 响应拦截器 - 统一处理错误
    axios.interceptors.response.use(response => {
        return response;
    }, error => {
        if (error.response && error.response.status === 401) {
            // token失效，清除登录状态
            localStorage.removeItem('userToken');
            token = null;
            checkUserLogin();
            alert('登录已过期，请重新登录');
        }
        return Promise.reject(error);
    });

    // 页面加载完成后执行
    document.addEventListener('DOMContentLoaded', function() {
        // 初始化页面
        initPage();

        // 绑定事件
        bindEvents();

        // 加载数据
        loadCategories();
        loadArticles(1);
    });

    // 初始化页面
    function initPage() {
        // 检查用户登录状态
        checkUserLogin();
    }

    // 检查用户登录状态
    function checkUserLogin() {
        if (token) {
            // 显示用户已登录状态
            document.getElementById('guestActions').classList.add('d-none');
            document.getElementById('userActionsLoggedIn').classList.remove('d-none');

            // 显示欢迎信息
            try {
                const base64Url = token.split('.')[1];
                const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
                const payload = JSON.parse(decodeURIComponent(escape(atob(base64))));
                document.getElementById('welcomeUser').textContent = `欢迎, ${payload.username}`;
            } catch (e) {
                console.error('解析token失败:', e);
            }

            // 加载用户信息
            loadUserInfo();
        } else {
            // 显示未登录状态
            document.getElementById('guestActions').classList.remove('d-none');
            document.getElementById('userActionsLoggedIn').classList.add('d-none');

            // 清空用户信息显示
            document.getElementById('userInfoContent').innerHTML = '<p class="text-muted">请登录后查看个人信息</p>';
        }
    }

    // 绑定事件
    function bindEvents() {
        // 筛选按钮
        document.getElementById('filterBtn').addEventListener('click', function() {
            currentFilters.categoryId = document.getElementById('categoryFilter').value;
            currentFilters.state = document.getElementById('stateFilter').value;
            loadArticles(1);
        });

        // 分类列表点击事件
        document.getElementById('categoryList').addEventListener('click', function(e) {
            if (e.target.classList.contains('list-group-item')) {
                e.preventDefault();
                document.querySelectorAll('.category-list .list-group-item').forEach(item => {
                    item.classList.remove('active');
                });
                e.target.classList.add('active');
                currentFilters.categoryId = e.target.getAttribute('data-id');
                loadArticles(1);
            }
        });

        // 退出登录
        document.getElementById('logoutBtn').addEventListener('click', function(e) {
            e.preventDefault();
            logout();
        });
    }

    // 退出登录
    function logout() {
        localStorage.removeItem('userToken');
        window.location.reload();
    }

    // 加载用户信息
    function loadUserInfo() {
        if (!token) return;

        console.log('正在加载用户信息...');

        axios.get('/user/userInfo')
            .then(response => {
                console.log('用户信息响应:', response.data);

                if (response.data.code === 0 && response.data.data) {
                    const user = response.data.data;
                    renderUserInfo(user);
                } else {
                    console.error('获取用户信息失败:', response.data.message);
                }
            })
            .catch(error => {
                console.error('加载用户信息失败:', error);
            });
    }

    // 渲染用户信息
    function renderUserInfo(user) {
        if (!user) return;

        const userInfoContent = document.getElementById('userInfoContent');

        // 处理用户头像
        const avatarUrl = user.userPic || 'https://via.placeholder.com/80';

        // 处理昵称
        const nickname = user.nickname || user.username;

        // 处理邮箱
        const email = user.email || '未设置邮箱';

        // 格式化加入时间
        const joinDate = formatDate(user.createTime);

        // 构建用户信息HTML
        const userInfoHTML = `
            <div class="text-center">
                <img src="${avatarUrl}"
                     class="rounded-circle mb-3"
                     style="width: 80px; height: 80px; object-fit: cover; border: 3px solid #667eea;"
                     onerror="this.src='https://via.placeholder.com/80'">
                <h6 class="fw-bold">${nickname}</h6>
                <p class="text-muted small mb-2">
                    <i class="bi bi-envelope me-1"></i>${email}
                </p>
                <div class="d-flex justify-content-around mt-3 pt-2 border-top">
                    <div class="text-center">
                        <strong class="d-block">0</strong>
                        <span class="small text-muted">文章</span>
                    </div>
                    <div class="text-center">
                        <strong class="d-block">0</strong>
                        <span class="small text-muted">粉丝</span>
                    </div>
                    <div class="text-center">
                        <strong class="d-block">0</strong>
                        <span class="small text-muted">获赞</span>
                    </div>
                </div>
                <div class="mt-3 text-start small text-muted">
                    <i class="bi bi-calendar me-1"></i>加入时间: ${joinDate}
                </div>
            </div>
        `;

        userInfoContent.innerHTML = userInfoHTML;
    }

    // 格式化日期
    function formatDate(dateStr) {
        if (!dateStr) return '未知';
        try {
            const date = new Date(dateStr);
            return date.toLocaleDateString('zh-CN', {
                year: 'numeric',
                month: '2-digit',
                day: '2-digit'
            }).replace(/\//g, '-');
        } catch (e) {
            return dateStr;
        }
    }

    // 加载文章列表
    // 修改 loadArticles 函数，添加 mode 参数
    function loadArticles(page, mode = 'normal') {
        currentPage = page;

        // 保存当前模式
        window.currentMode = mode;

        // 显示加载中
        const container = document.getElementById('articlesContainer');
        container.innerHTML = `
        <div class="text-center py-5">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">加载中...</span>
            </div>
            <p class="mt-2">加载文章中...</p>
        </div>
    `;

        let url;
        if (mode === 'hot') {
            // 热门文章接口
            url = `/article/hot?pageNum=${page}&pageSize=${pageSize}`;
        } else {
            // 普通文章接口
            url = `/article/page?pageNum=${page}&pageSize=${pageSize}`;
        }

        if (currentFilters.categoryId) {
            url += `&categoryId=${currentFilters.categoryId}`;
        }

        // 普通模式才传状态筛选
        if (mode !== 'hot' && currentFilters.state) {
            url += `&state=${currentFilters.state}`;
        }

        axios.get(url)
            .then(response => {
                if (response.data.code === 0 && response.data.data) {
                    const data = response.data.data;
                    renderArticles(data.items || [], mode);
                    renderPagination(data.total || 0, page, pageSize);
                } else {
                    renderArticles([]);
                    renderPagination(0, page, pageSize);
                }
            })
            .catch(error => {
                console.error('加载文章失败:', error);
                container.innerHTML = `
                <div class="alert alert-danger">
                    <i class="bi bi-exclamation-triangle me-2"></i>
                    请登录后查看文章
                </div>
            `;
            });
    }

    // 加载热门文章
    function loadHotArticles() {
        // 更新当前模式
        window.currentMode = 'hot';
        currentFilters.state = '已发布';  // 只显示已发布的
        currentFilters.categoryId = '';   // 重置分类筛选

        // 更新UI
        document.getElementById('categoryFilter').value = '';
        document.getElementById('stateFilter').value = '已发布';

        // 重置分类列表激活状态
        document.querySelectorAll('.category-list .list-group-item').forEach(item => {
            item.classList.remove('active');
        });
        document.querySelector('.category-list .list-group-item:first-child').classList.add('active');

        // 加载热门文章
        loadArticles(1, 'hot');
    }

    // 加载最新文章
    function loadLatestArticles() {
        // 更新当前模式
        window.currentMode = 'latest';
        currentFilters.state = '已发布';
        currentFilters.categoryId = '';

        // 更新UI
        document.getElementById('categoryFilter').value = '';
        document.getElementById('stateFilter').value = '已发布';

        // 重置分类列表
        document.querySelectorAll('.category-list .list-group-item').forEach(item => {
            item.classList.remove('active');
        });
        document.querySelector('.category-list .list-group-item:first-child').classList.add('active');

        // 加载最新文章
        loadArticles(1, 'latest');
    }


    // 生成热度星星
    function generatePopularityStars(popularity) {
        if (!popularity) popularity = 0;

        // 将热度0-10转换为星星数0-5
        const starCount = Math.round(popularity / 2); // 0-5星
        const fullStars = Math.floor(starCount);
        const hasHalfStar = starCount - fullStars >= 0.5;

        let stars = '';

        // 添加实心星星
        for (let i = 0; i < fullStars; i++) {
            stars += '<i class="bi bi-star-fill text-warning"></i>';
        }

        // 添加半星
        if (hasHalfStar) {
            stars += '<i class="bi bi-star-half text-warning"></i>';
        }

        // 添加空心星星（补齐到5星）
        const emptyStars = 5 - fullStars - (hasHalfStar ? 1 : 0);
        for (let i = 0; i < emptyStars; i++) {
            stars += '<i class="bi bi-star text-warning"></i>';
        }

        return stars;
    }
    // 渲染文章列表
    // 渲染文章列表 - 添加 mode 参数
    function renderArticles(articles, mode = 'normal') {
        const container = document.getElementById('articlesContainer');

        if (!articles || articles.length === 0) {
            let message = '当前没有符合条件的文章';
            if (mode === 'hot') {
                message = '暂无热门文章';
            }
            container.innerHTML = `
            <div class="no-articles">
                <i class="bi bi-file-earmark-text"></i>
                <h4>${message}</h4>
                <p>稍后再来看看吧</p>
            </div>
        `;
            return;
        }

        container.innerHTML = '';

        articles.forEach(article => {
            // 查找分类名称
            const category = categories.find(c => c.id === article.categoryId);
            const categoryName = category ? category.categoryName : '未知分类';

            // 处理封面图
            const coverImg = article.coverImg || 'https://via.placeholder.com/300x200';

            // 生成热度星星（如果是热门模式）
            const popularityStars = mode === 'hot' ? generatePopularityStars(article.popularity || 0) : '';

            const articleElement = document.createElement('div');
            articleElement.className = 'card article-card';
            articleElement.innerHTML = `
            <div class="row g-0">
                <div class="col-md-4">
                    <img src="${coverImg}"
                         class="img-fluid article-cover"
                         alt="${article.title || '文章封面'}"
                         onerror="this.src='https://via.placeholder.com/300x200'">
                </div>
                <div class="col-md-8">
                    <div class="card-body h-100 d-flex flex-column">
                        <div class="d-flex justify-content-between align-items-start">
                            <h5 class="card-title">
                                <a href="#" class="text-decoration-none text-dark"
                                   onclick="viewArticle(${article.id}); return false;">
                                    ${article.title || '无标题'}
                                </a>
                            </h5>
                            ${mode === 'hot' ? `
                                <div class="ms-2">
                                    ${popularityStars}
                                    <span class="badge bg-danger ms-1">热度 ${article.popularity || 0}</span>
                                </div>
                            ` : ''}
                        </div>
                        <p class="card-text flex-grow-1">${article.content ? article.content.substring(0, 100) + '...' : '暂无内容'}</p>
                        <div class="d-flex justify-content-between align-items-center mt-auto">
                            <div>
                                <span class="category-badge me-2">${categoryName}</span>
                                ${article.state ? `
                                    <span class="article-state state-${article.state === '已发布' ? 'published' : 'draft'}">
                                        ${article.state}
                                    </span>
                                ` : ''}
                            </div>
                            <div class="article-meta">
                                <small>
                                    <i class="bi bi-calendar me-1"></i>
                                    ${formatDate(article.createTime)}
                                </small>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        `;
            container.appendChild(articleElement);
        });
    }

    // 查看文章详情
    function viewArticle(articleId) {
        // 这里可以跳转到文章详情页
        console.log('查看文章:', articleId);
        // window.location.href = `/article/${articleId}`;
    }

    // 渲染分页
    function renderPagination(total, currentPage, pageSize) {
        const totalPages = Math.ceil(total / pageSize);
        const pagination = document.getElementById('pagination');
        const paginationContainer = document.getElementById('paginationContainer');

        pagination.innerHTML = '';

        if (totalPages <= 1) {
            paginationContainer.classList.add('d-none');
            return;
        }

        paginationContainer.classList.remove('d-none');

        // 上一页
        const prevItem = document.createElement('li');
        prevItem.className = `page-item ${currentPage === 1 ? 'disabled' : ''}`;
        prevItem.innerHTML = `
        <a class="page-link" href="#"
           ${currentPage !== 1 ? `onclick="loadArticles(${currentPage - 1}, window.currentMode || 'normal'); return false;"` : ''}>
            <i class="bi bi-chevron-left"></i>
        </a>
    `;

        pagination.appendChild(prevItem);

        // 页码
        const startPage = Math.max(1, currentPage - 2);
        const endPage = Math.min(totalPages, currentPage + 2);

        for (let i = startPage; i <= endPage; i++) {
            const pageItem = document.createElement('li');
            pageItem.className = `page-item ${i === currentPage ? 'active' : ''}`;
            pageItem.innerHTML = `
                <a class="page-link" href="#" onclick="loadArticles(${i}); return false;">${i}</a>
            `;
            pagination.appendChild(pageItem);
        }

        // 下一页
        const nextItem = document.createElement('li');
        nextItem.className = `page-item ${currentPage === totalPages ? 'disabled' : ''}`;
        nextItem.innerHTML = `
            <a class="page-link" href="#"
               ${currentPage !== totalPages ? `onclick="loadArticles(${currentPage + 1}); return false;"` : ''}>
                <i class="bi bi-chevron-right"></i>
            </a>
        `;
        pagination.appendChild(nextItem);
    }

    // 加载分类列表
    function loadCategories() {
        axios.get('/user/category')
            .then(response => {
                console.log('分类响应:', response.data);

                if (response.data.code === 0) {
                    categories = response.data.data || [];
                } else {
                    categories = [];
                }
                renderCategories(categories);
                renderCategoryFilter(categories);
            })
            .catch(error => {
                console.error('加载分类失败:', error);
                categories = [];
                renderCategories([]);
                renderCategoryFilter([]);
            });
    }

    // 渲染分类列表
    function renderCategories(categories) {
        const container = document.getElementById('categoryList');

        // 保留"全部分类"选项
        container.innerHTML = `
            <a href="#" class="list-group-item list-group-item-action active" data-id="">
                全部分类
            </a>
        `;

        categories.forEach(category => {
            const categoryElement = document.createElement('a');
            categoryElement.href = '#';
            categoryElement.className = 'list-group-item list-group-item-action';
            categoryElement.setAttribute('data-id', category.id);
            categoryElement.textContent = category.categoryName;
            container.appendChild(categoryElement);
        });
    }

    // 渲染分类筛选下拉框
    function renderCategoryFilter(categories) {
        const select = document.getElementById('categoryFilter');

        // 保留默认选项
        select.innerHTML = '<option value="">所有分类</option>';

        categories.forEach(category => {
            const option = document.createElement('option');
            option.value = category.id;
            option.textContent = category.categoryName;
            select.appendChild(option);
        });
    }

</script>
</body>
</html>
