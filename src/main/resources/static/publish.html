<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>发布文章 - 校园论坛</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <!-- 引入富文本编辑器样式 -->
    <link href="https://cdn.jsdelivr.net/npm/summernote@0.8.18/dist/summernote-bs4.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .publish-container {
            background: white;
            border-radius: 10px;
            padding: 30px;
            box-shadow: 0 0.125rem 0.25rem rgba(0, 0, 0, 0.075);
            margin-top: 20px;
            margin-bottom: 20px;
        }
        .form-label {
            font-weight: 600;
            color: #495057;
        }
        .btn-publish {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 10px 30px;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        .btn-publish:hover {
            transform: translateY(-2px);
            box-shadow: 0 0.5rem 1rem rgba(102, 126, 234, 0.3);
            color: white;
        }
        .btn-draft {
            background: #6c757d;
            color: white;
            border: none;
            padding: 10px 30px;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        .btn-draft:hover {
            background: #5a6268;
            color: white;
        }
        .cover-preview {
            max-width: 100%;
            max-height: 200px;
            margin-top: 10px;
            border-radius: 5px;
            display: none;
            object-fit: cover;
        }
        .note-editor {
            border-radius: 5px;
        }
        .note-editable {
            min-height: 300px;
        }
        .required-field::after {
            content: "*";
            color: red;
            margin-left: 4px;
        }
        .category-badge {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 1rem 0;
            margin-bottom: 2rem;
        }
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }
        .loading-spinner {
            width: 50px;
            height: 50px;
        }
    </style>
</head>
<body>
<!-- 加载动画 -->
<div class="loading-overlay" id="loadingOverlay">
    <div class="spinner-border text-primary loading-spinner" role="status">
        <span class="visually-hidden">加载中...</span>
    </div>
</div>

<!-- 导航栏 -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="index">
            <i class="bi bi-chat-square-text me-2"></i>校园论坛
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link" href="index">首页</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link active" href="publish">
                        <i class="bi bi-pencil-square me-1"></i>发布文章
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="my-articles">我的文章</a>
                </li>
            </ul>
            <div class="d-flex align-items-center" id="userActions">
                <!-- 未登录状态 -->
                <div id="guestActions" class="d-none">
                    <a href="login" class="btn btn-outline-light me-2">登录</a>
                    <a href="register" class="btn btn-light">注册</a>
                </div>
                <!-- 登录状态 -->
                <div id="userActionsLoggedIn">
                    <span class="text-white me-3" id="welcomeUser"></span>
                    <div class="dropdown">
                        <button class="btn btn-outline-light dropdown-toggle" type="button" data-bs-toggle="dropdown">
                            <i class="bi bi-person-circle me-1"></i>个人中心
                        </button>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" href="user-info"><i class="bi bi-person me-2"></i>个人信息</a></li>
                            <li><a class="dropdown-item" href="my-articles"><i class="bi bi-file-earmark-text me-2"></i>我的文章</a></li>
                            <li><hr class="dropdown-divider"></li>
                            <li><a class="dropdown-item" href="#" id="logoutBtn"><i class="bi bi-box-arrow-right me-2"></i>退出登录</a></li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </div>
</nav>

<!-- 主要内容 -->
<div class="container">
    <div class="publish-container">
        <h3 class="mb-4">
            <i class="bi bi-pencil-square me-2" style="color: #667eea;"></i>
            发布新文章
        </h3>

        <form id="publishForm">
            <!-- 文章标题 -->
            <div class="mb-4">
                <label for="title" class="form-label required-field">文章标题</label>
                <input type="text" class="form-control form-control-lg" id="title" name="title"
                       placeholder="请输入文章标题（1-20字）" required maxlength="20">
                <div class="form-text">标题最多20个字</div>
            </div>

            <!-- 分类选择 -->
            <div class="mb-4">
                <label for="categoryId" class="form-label required-field">文章分类</label>
                <select class="form-select" id="categoryId" name="categoryId" required>
                    <option value="" selected disabled>请选择文章分类</option>
                </select>
            </div>

            <!-- 封面图片 -->
            <div class="mb-4">
                <label for="coverImg" class="form-label">封面图片</label>
                <div class="input-group">
                    <input type="url" class="form-control" id="coverImg" name="coverImg"
                           placeholder="请输入图片URL（可选）" onchange="previewCover(this)">
                    <button class="btn btn-outline-secondary" type="button" onclick="useRandomCover()">
                        <i class="bi bi-shuffle"></i> 随机封面
                    </button>
                </div>
                <div class="form-text">支持输入图片URL，如果留空将使用默认图片</div>
                <img src="" alt="封面预览" class="cover-preview" id="coverPreview">
            </div>

            <!-- 文章状态 -->
            <div class="mb-4">
                <label class="form-label">发布状态</label>
                <div>
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="state" id="statePublish" value="已发布" checked>
                        <label class="form-check-label" for="statePublish">
                            <span class="badge bg-success">直接发布</span>
                        </label>
                    </div>
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="state" id="stateDraft" value="草稿">
                        <label class="form-check-label" for="stateDraft">
                            <span class="badge bg-secondary">保存草稿</span>
                        </label>
                    </div>
                </div>
            </div>

            <!-- 文章内容 -->
            <div class="mb-4">
                <label for="content" class="form-label required-field">文章内容</label>
                <textarea id="content" name="content" class="form-control" rows="10" required></textarea>
            </div>

            <!-- 按钮组 -->
            <div class="d-flex justify-content-end gap-2">
                <button type="button" class="btn btn-draft" onclick="saveAsDraft()">
                    <i class="bi bi-save me-2"></i>保存草稿
                </button>
                <button type="submit" class="btn btn-publish">
                    <i class="bi bi-send me-2"></i>发布文章
                </button>
            </div>
        </form>
    </div>
</div>

<!-- 页脚 -->
<footer class="bg-dark text-white mt-5 py-4">
    <div class="container">
        <div class="row">
            <div class="col-md-6">
                <h5><i class="bi bi-chat-square-text me-2"></i>校园论坛</h5>
                <p>一个专为校园用户打造的交流平台，分享知识、经验和生活。</p>
            </div>
            <div class="col-md-3">
                <h5>链接</h5>
                <ul class="list-unstyled">
                    <li><a href="#" class="text-white text-decoration-none">关于我们</a></li>
                    <li><a href="#" class="text-white text-decoration-none">联系我们</a></li>
                    <li><a href="#" class="text-white text-decoration-none">帮助中心</a></li>
                </ul>
            </div>
            <div class="col-md-3">
                <h5>关注我们</h5>
                <div class="d-flex gap-3">
                    <a href="#" class="text-white"><i class="bi bi-wechat"></i></a>
                    <a href="#" class="text-white"><i class="bi bi-weibo"></i></a>
                    <a href="#" class="text-white"><i class="bi bi-github"></i></a>
                </div>
            </div>
        </div>
        <hr>
        <div class="text-center">
            <p class="mb-0">&copy; 2023 校园论坛. 保留所有权利.</p>
        </div>
    </div>
</footer>

<!-- 引入必要的JS文件 -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/summernote@0.8.18/dist/summernote-bs4.min.js"></script>

<script>
    // 全局变量
    let token = localStorage.getItem('userToken');
    let categories = [];

    // 配置axios
    axios.defaults.baseURL = window.location.origin;

    // 请求拦截器
    axios.interceptors.request.use(config => {
        if (token) {
            config.headers.Authorization = `Bearer ${token}`;
        }
        return config;
    });

    // 响应拦截器
    axios.interceptors.response.use(response => {
        hideLoading();
        return response;
    }, error => {
        hideLoading();
        if (error.response && error.response.status === 401) {
            alert('登录已过期，请重新登录');
            window.location.href = 'login';
        }
        return Promise.reject(error);
    });

    // 页面加载完成后执行
    document.addEventListener('DOMContentLoaded', function() {
        // 检查登录状态
        checkLogin();

        // 加载分类
        loadCategories();

        // 初始化富文本编辑器
        initEditor();

        // 绑定表单提交事件
        document.getElementById('publishForm').addEventListener('submit', handleSubmit);
    });

    // 显示加载动画
    function showLoading() {
        document.getElementById('loadingOverlay').style.display = 'flex';
    }

    // 隐藏加载动画
    function hideLoading() {
        document.getElementById('loadingOverlay').style.display = 'none';
    }

    // 检查登录状态
    function checkLogin() {
        if (!token) {
            alert('请先登录后再发布文章');
            window.location.href = 'login';
            return;
        }

        // 显示用户信息
        document.getElementById('guestActions').classList.add('d-none');
        document.getElementById('userActionsLoggedIn').classList.remove('d-none');

        try {
            const payload = JSON.parse(atob(token.split('.')[1]));
            document.getElementById('welcomeUser').textContent = `欢迎, ${payload.username || '用户'}`;
        } catch (e) {
            console.error('解析token失败:', e);
        }

        // 绑定退出登录
        document.getElementById('logoutBtn').addEventListener('click', function(e) {
            e.preventDefault();
            logout();
        });
    }

    // 退出登录
    function logout() {
        localStorage.removeItem('userToken');
        window.location.href = 'login';
    }

    // 初始化富文本编辑器
    function initEditor() {
        $('#content').summernote({
            placeholder: '请输入文章内容...',
            tabsize: 2,
            height: 400,
            toolbar: [
                ['style', ['style']],
                ['font', ['bold', 'underline', 'italic', 'clear']],
                ['fontname', ['fontname']],
                ['fontsize', ['fontsize']],
                ['color', ['color']],
                ['para', ['ul', 'ol', 'paragraph']],
                ['table', ['table']],
                ['insert', ['link', 'picture', 'video']],
                ['view', ['fullscreen', 'codeview', 'help']]
            ],
            callbacks: {
                onImageUpload: function(files) {
                    // 这里可以添加上传图片到服务器的逻辑
                    alert('图片上传功能需要后端支持，请使用图片URL');
                },
                onBlur: function() {
                    // 编辑器失去焦点时触发
                }
            }
        });
    }

    // 加载分类列表
    function loadCategories() {
        axios.get('/user/category')
            .then(response => {
                if (response.data.code === 0) {
                    categories = response.data.data || [];
                    renderCategories(categories);
                }
            })
            .catch(error => {
                console.error('加载分类失败:', error);
            });
    }

    // 渲染分类下拉框
    function renderCategories(categories) {
        const select = document.getElementById('categoryId');
        select.innerHTML = '<option value="" selected disabled>请选择文章分类</option>';

        categories.forEach(category => {
            const option = document.createElement('option');
            option.value = category.id;
            option.textContent = category.categoryName;
            select.appendChild(option);
        });
    }

    // 预览封面图片
    function previewCover(input) {
        const preview = document.getElementById('coverPreview');
        if (input.value) {
            preview.src = input.value;
            preview.style.display = 'block';
        } else {
            preview.style.display = 'none';
        }
    }

    // 使用随机封面图片
    function useRandomCover() {
        const randomImages = [
            'https://picsum.photos/800/400?random=1',
            'https://picsum.photos/800/400?random=2',
            'https://picsum.photos/800/400?random=3',
            'https://picsum.photos/800/400?random=4',
            'https://picsum.photos/800/400?random=5'
        ];
        const randomIndex = Math.floor(Math.random() * randomImages.length);
        const coverInput = document.getElementById('coverImg');
        coverInput.value = randomImages[randomIndex];
        previewCover(coverInput);
    }

    // 处理表单提交
    function handleSubmit(e) {
        e.preventDefault();

        // 获取表单数据
        const title = document.getElementById('title').value.trim();
        const categoryId = document.getElementById('categoryId').value;
        const coverImg = document.getElementById('coverImg').value.trim();
        const state = document.querySelector('input[name="state"]:checked').value;
        const content = $('#content').summernote('code');

        // 验证
        if (!title) {
            alert('请输入文章标题');
            document.getElementById('title').focus();
            return;
        }

        if (title.length > 20) {
            alert('标题不能超过20个字');
            document.getElementById('title').focus();
            return;
        }

        if (!categoryId) {
            alert('请选择文章分类');
            document.getElementById('categoryId').focus();
            return;
        }

        if (!content || content === '<p><br></p>' || content === '<p></p>') {
            alert('请输入文章内容');
            $('#content').summernote('focus');
            return;
        }

        // 构建文章对象
        const article = {
            title: title,
            categoryId: parseInt(categoryId),
            coverImg: coverImg || 'https://picsum.photos/800/400?random=' + Math.floor(Math.random() * 100),
            state: state,
            content: content
        };

        console.log('发布文章:', article);

        // 显示加载动画
        showLoading();

        // 发送请求
        axios.post('/user/article', article)
            .then(response => {
                if (response.data.code === 0) {
                    alert('文章发布成功！');
                    if (state === '已发布') {
                        window.location.href = '/index';
                    } else {
                        window.location.href = '/my-articles';
                    }
                } else {
                    alert('发布失败：' + response.data.message);
                }
            })
            .catch(error => {
                console.error('发布失败:', error);
                alert('发布失败，请稍后重试');
            });
    }

    // 保存为草稿
    function saveAsDraft() {
        document.querySelector('input[name="state"][value="草稿"]').checked = true;
        document.getElementById('publishForm').dispatchEvent(new Event('submit'));
    }
</script>
</body>
</html>
